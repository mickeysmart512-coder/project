workflows:
  expo-eas-apk:
    name: Expo EAS Build (APK)
    max_build_duration: 60
    environment:
      node: 18
      java: 17
      vars:
        EAS_NO_VCS: 1
      groups:
        - expo_credentials
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install EAS CLI
        script: npm install -g eas-cli
      - name: Authenticate with Expo
        script: eas whoami || eas login --token $EXPO_TOKEN
      - name: Build APK using EAS
        script: eas build --platform android --profile preview --non-interactive
    artifacts:
      - build/**/*.apk
    publishing:
      email:
        recipients:
          - onojamichaelmichael@gmail.com # you can update this to your actual email
