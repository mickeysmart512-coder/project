workflows:
  expo-android-workflow:
    name: Expo Android Build
    environment:
      groups:
        - expo_credentials  # Store EXPO_TOKEN here
    triggering:
      events:
        - push
    scripts:
      - npm install -g eas-cli
      - npm install
      - eas build --platform android --non-interactive
    artifacts:
      - build/**/*.apk  