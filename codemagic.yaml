workflows:
  expo-apk-workflow:
    name: Expo APK Build
    max_build_duration: 60
    environment:
      vars:
        EXPO_PROJECT_ROOT: .
      node: 18
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install Expo CLI
        script: npm install -g expo-cli
      - name: Build APK using Expo
        script: |
          expo export --dev --output-dir dist
          npx expo install
          expo build:android -t apk --non-interactive
    artifacts:
      - build/**/*.apk
    publishing:
      email:
        recipients:
          - onojamichaelmichael@gmail.com
